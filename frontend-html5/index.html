<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bebrakumpis</title>
    <style>
      /* === Reset & Base === */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; color: #1a1a2e; background: #f4f6fb; }
      button { cursor: pointer; font: inherit; border: none; background: none; }
      a { color: inherit; text-decoration: none; }
      input { font: inherit; }

      /* === App Shell === */
      #app { display: flex; min-height: 100vh; }

      /* === Sidebar === */
      .bh-sidebar { width: 240px; background: #1a1a2e; color: #e8eaf6; display: flex; flex-direction: column; padding: 0; flex-shrink: 0; }
      .bh-sidebar-brand { padding: 1.5rem 1.25rem 1rem; font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .bh-nav { flex: 1; padding: 1rem 0; display: flex; flex-direction: column; gap: 2px; }
      .bh-nav-link { padding: 0.6rem 1.25rem; border-radius: 0; color: #b0b8d0; font-size: 0.925rem; transition: background 0.15s, color 0.15s; }
      .bh-nav-link:hover { background: rgba(255,255,255,0.07); color: #fff; }
      .bh-nav-link.active { background: rgba(99,102,241,0.25); color: #a5b4fc; font-weight: 600; }
      .bh-sidebar-footer { padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 0.5rem; }
      .bh-user-name { font-size: 0.875rem; color: #9ca3af; }

      /* === Main === */
      .bh-main { flex: 1; padding: 2rem; overflow-y: auto; }

      /* === Login Page === */
      .bh-login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f4f6fb; }
      .bh-login-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; width: 100%; max-width: 400px; }
      .bh-login-title { font-size: 1.75rem; font-weight: 700; text-align: center; margin-bottom: 2rem; color: #1a1a2e; }

      /* === Forms === */
      .bh-form { display: flex; flex-direction: column; gap: 1.25rem; }
      .bh-form-group { display: flex; flex-direction: column; gap: 0.375rem; }
      .bh-form-grid { display: grid; gap: 1rem; }
      .bh-form-grid-2 { grid-template-columns: repeat(2, 1fr); }
      .bh-label { font-size: 0.875rem; font-weight: 500; color: #374151; }
      .bh-input { padding: 0.625rem 0.875rem; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 0.925rem; transition: border-color 0.15s; outline: none; }
      .bh-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

      /* === Buttons === */
      .bh-btn { padding: 0.6rem 1.25rem; border-radius: 8px; font-size: 0.925rem; font-weight: 500; transition: background 0.15s, opacity 0.15s; }
      .bh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .bh-btn-primary { background: #6366f1; color: #fff; }
      .bh-btn-primary:hover:not(:disabled) { background: #4f46e5; }
      .bh-btn-sm { padding: 0.4rem 0.875rem; font-size: 0.825rem; }
      .bh-btn-full { width: 100%; }
      .bh-btn-danger { background: #ef4444; color: #fff; }
      .bh-btn-danger:hover:not(:disabled) { background: #dc2626; }

      /* === Badges === */
      .bh-badge { display: inline-block; padding: 0.2em 0.6em; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
      .bh-badge-admin { background: #ddd6fe; color: #5b21b6; }
      .bh-badge-user { background: #d1fae5; color: #065f46; }

      /* === Tables === */
      .bh-table-scroll { overflow-x: auto; }
      .bh-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      .bh-table th { text-align: left; padding: 0.75rem 1rem; background: #f9fafb; color: #6b7280; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #e5e7eb; }
      .bh-table td { padding: 0.875rem 1rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
      .bh-table tbody tr:hover { background: #f9fafb; }

      /* === Stat Grid === */
      .bh-stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
      .bh-stat-card { background: #fff; border-radius: 10px; padding: 1.25rem 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
      .bh-stat-label { font-size: 0.8rem; color: #9ca3af; text-transform: uppercase; font-weight: 600; }
      .bh-stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }

      /* === Feedback States === */
      .bh-spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2rem auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .bh-error-message { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.9rem; }
      .bh-empty-state { text-align: center; color: #9ca3af; padding: 3rem 1rem; font-size: 1rem; }

      /* === Modal === */
      .bh-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; }
      .bh-modal.bh-modal-open { display: flex; }
      .bh-modal-inner { background: #fff; border-radius: 12px; padding: 2rem; width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
      .bh-modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; }

      /* === Page Header === */
      .bh-page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
      .bh-page-title { font-size: 1.5rem; font-weight: 700; }

      /* === Cards === */
      .bh-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 1.5rem; margin-bottom: 1.25rem; }

      /* === Calendar === */
      .bh-cal-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
      .bh-cal-title { font-size: 1.25rem; font-weight: 700; flex: 1; }
      .bh-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
      .bh-cal-dow { padding: 0.5rem; text-align: center; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #6b7280; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
      .bh-cal-day { min-height: 100px; padding: 0.5rem 0.4rem 0.4rem; border-right: 1px solid #f3f4f6; border-bottom: 1px solid #f3f4f6; vertical-align: top; position: relative; background: #fff; }
      .bh-cal-day:nth-child(7n) { border-right: none; }
      .bh-cal-day.bh-cal-other-month { background: #fafafa; }
      .bh-cal-day-num { font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.35rem; }
      .bh-cal-day.bh-cal-today .bh-cal-day-num { background: #6366f1; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
      .bh-cal-band { border-radius: 3px; padding: 1px 5px; font-size: 0.7rem; font-weight: 500; color: #fff; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; }
      .bh-cal-band-reserved { background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 3px, transparent 3px, transparent 7px); }
      .bh-cal-band-actions { display: none; position: absolute; right: 2px; top: 0; bottom: 0; align-items: center; gap: 2px; }
      .bh-cal-band:hover .bh-cal-band-actions { display: flex; }
      .bh-cal-band-btn { background: rgba(0,0,0,0.25); border: none; color: #fff; border-radius: 2px; padding: 0 4px; cursor: pointer; font-size: 0.65rem; line-height: 1.4; }
      .bh-cal-band-btn:hover { background: rgba(0,0,0,0.5); }
      .bh-cal-tooltip { position: fixed; background: #1f2937; color: #fff; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.8rem; max-width: 260px; z-index: 200; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
      .bh-cal-tooltip-title { font-weight: 700; margin-bottom: 0.35rem; }
      .bh-cal-tooltip-row { color: #d1d5db; margin-top: 0.2rem; }

      /* === Gallery === */
      .bh-gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
      .bh-gallery-item { position: relative; background: #f3f4f6; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; cursor: pointer; }
      .bh-gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.2s; }
      .bh-gallery-item img.bh-gallery-broken { object-fit: contain; opacity: 0.4; }
      .bh-gallery-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background 0.2s; display: flex; flex-direction: column; justify-content: space-between; padding: 0.5rem; }
      .bh-gallery-item:hover .bh-gallery-overlay { background: rgba(0,0,0,0.35); }
      .bh-gallery-actions { display: none; justify-content: flex-end; gap: 0.25rem; }
      .bh-gallery-item:hover .bh-gallery-actions { display: flex; }
      .bh-gallery-reorder { display: none; justify-content: flex-start; gap: 0.25rem; align-self: flex-end; }
      .bh-gallery-item:hover .bh-gallery-reorder { display: flex; }
      .bh-gallery-btn { background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 5px; padding: 0.2rem 0.4rem; cursor: pointer; font-size: 0.8rem; line-height: 1.4; }
      .bh-gallery-btn:hover { background: rgba(0,0,0,0.8); }
      .bh-lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 300; cursor: zoom-out; }
      .bh-lightbox.bh-lightbox-open { display: flex; }
      .bh-lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; cursor: default; }
      .bh-lightbox-close { position: fixed; top: 1.25rem; right: 1.5rem; color: #fff; font-size: 2rem; cursor: pointer; background: none; border: none; line-height: 1; }

      /* === Main Page === */
      .bh-hero { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 2rem 2.5rem; margin-bottom: 2rem; }
      .bh-hero-title { font-size: 2rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1rem; }
      .bh-hero-text { color: #4b5563; line-height: 1.7; margin-bottom: 0.75rem; }
      .bh-hero-text:last-child { margin-bottom: 0; }
      .bh-section { margin-bottom: 2.5rem; }
      .bh-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
      .bh-section-title { font-size: 1.25rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1rem; }
      .bh-section-header .bh-section-title { margin-bottom: 0; }
      .bh-gallery-teaser-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
      .bh-gallery-teaser-item { position: relative; background: #f3f4f6; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; }
      .bh-gallery-teaser-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .bh-gallery-teaser-item img.bh-gallery-broken { object-fit: contain; opacity: 0.4; }
      .bh-gallery-teaser-link { color: #6366f1; font-size: 0.925rem; font-weight: 500; }
      .bh-gallery-teaser-link:hover { text-decoration: underline; }

      /* === Responsive === */
      @media (max-width: 768px) {
        .bh-sidebar { width: 200px; }
        .bh-form-grid-2 { grid-template-columns: 1fr; }
        .bh-stat-grid { grid-template-columns: 1fr; }
        .bh-gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
